name: Build Windows Installer

# Triggered on tag push (v*). Builds sets-warp-vX.Y-setup.exe and attaches it to the release.
# Note: release: published is NOT used because GitHub Actions with GITHUB_TOKEN cannot
# trigger other workflows via that event — so we trigger directly from the tag push.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach installer to (e.g. v1.8b)'
        required: true
        default: 'v1.8b'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Get version from tag
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Build installer
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" `
            /DAppVersion=$version `
            installer\sets_warp.iss
        shell: pwsh

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: installer/dist/sets-warp-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
